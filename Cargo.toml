[package]
name = "kb"
version = "0.2.6"
authors = ["killbasa"]
edition = "2021"
repository = "https://github.com/killbasa/cli"
license = "MIT"

[profile.release]
lto = true

[dependencies]
anyhow = "1.0.81"
byte-unit = "5.1.4"
clap = { version = "4.5.4", features = ["derive"] }
clap_complete = "4.5.1"
confy = "0.6.1"
curl = "0.4.46"
dunce = "1.0.4"
git2 = "0.18.3"
glob = "0.3.1"
once_cell = "1.19.0"
open = "5.1.2"
openssl = "0.10.64"
reqwest = { version = "0.12.2", features = ["blocking", "json"] }
serde = { version = "1.0.197", features = ["derive"] }
spinoff = { version = "0.8.0", features = ["dots"] }
url = "2.5.0"
